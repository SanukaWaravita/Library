<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Library</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/floating-cards.css">
    <link rel="stylesheet" href="styles/note-card.css">
    <link rel="stylesheet" href="styles/launcher.css">
    <link rel="stylesheet" href="styles/markdown.css">
    <link rel="stylesheet" href="styles/highlight-github.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <span class="navbar-logo">L</span>
        <span class="navbar-title">Library</span>
    </nav>

    <!-- Floating cards background -->
    <div id="canvas" class="canvas"></div>

    <!-- Note card (opened note — hidden by default) -->
    <div id="note-card" class="note-card hidden">
        <div class="note-card-header" id="note-card-header">
            <div class="note-card-actions-left">
                <button id="btn-index" class="note-btn" title="Back to index">Index</button>
                <button id="btn-random" class="note-btn" title="Random note">Random</button>
            </div>
            <span id="note-card-title" class="note-card-title"></span>
            <button id="btn-close" class="note-btn note-btn-close" title="Close">&times;</button>
        </div>
        <div id="note-card-body" class="note-card-body"></div>
        <div class="note-card-resize" id="note-card-resize"></div>
    </div>

    <!-- Launcher (bottom-right) -->
    <div id="launcher" class="launcher">
        <button id="launcher-btn" class="launcher-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="8" x2="20" y2="8"/>
                <line x1="4" y1="16" x2="20" y2="16"/>
            </svg>
        </button>
        <div id="launcher-panel" class="launcher-panel hidden">
            <div class="launcher-panel-title">Categories</div>
            <div id="launcher-list" class="launcher-list"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="scripts/vendor/marked.min.js"></script>
    <script src="scripts/vendor/highlight.min.js"></script>
    <script src="scripts/markdown-engine.js"></script>
    <script src="scripts/floating-cards.js"></script>
    <script src="scripts/note-card.js"></script>
    <script src="scripts/launcher.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
